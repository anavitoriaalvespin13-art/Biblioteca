<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/css/index.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script defer src="/frontend/js/index.js"></script>
    <title>Formulario de login</title>
</head>

<body>

    <div class="cont-login">
        <h1 class="title">BIBLIOTECA</h1>
        <p class="subtitle">CONHECIMENTO QUE TRASFORMA</p>
    </div>
    <img src="/frontend/img/fundo.png" alt="Login Image" class="login-image">

    <div class="mensagensCorfirm" id="mensagens"><p></p></div>


    <div class="container_form" id="loginForm">

      <div class="welcome" id="bemvindoLogin">
            <h2>Bem-vindo de volta!</h2>
            <p>Faça login para acessar sua conta</p>
       </div>
      <div class="welcome" id="bemvindoCadastro" style="display: none";>
            <h2>Bem-vindo à Biblioteca!</h2>
            <p>Crie sua conta e comece a explorar</p>
       </div>

         <div class="form-buttons">
            <button id="entra" class="entra ativo" onclick="mostrarLogin()">Login</button>
            <button id="criar" class="criar" onclick="mostrarCadastro()">Criar Conta</button>
          </div>

            <form id="login">
        <div class="mensagens" id="mensagensErroLogin">
            <p></p> 
           </div>

        <div class="inputs">
            <div class="input">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required><br><br>
           </div>

           <div class="input">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required><br><br>
         </div>
      </div>
            <div class="forgot-password">
                <div>
                    <input type="checkbox">
                    <span>Lembrar-me</span>
                </div>
                <a href="#">Esqueci minha senha?</a>
            </div>

            <button type="button" class="btn" onclick="login()">Entrar</button>

            <div class="sep">
                <hr>
                <span>ou entre com</span>
                <hr>
            </div>


            <div class="social-login">
                <a href="#"><i class="bi bi-google"></i></a>
                <a href="#"><i class="bi bi-facebook"></i></a>
            </div>
             </form>

               <form id="cadastro" style="display:none";>
           <div class="mensagens" id="mensagensErroCadastro">
            <p></p> 
           </div>

          <div class="inputs">     
           <div class="input">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required><br><br>
          </div>
          
          <div class="input">
            <label for="email">E-mail:</label>
            <input type="email" id="emailCadastro" name="emailCadastro" required><br><br>
          </div>

          <div class="input">
            <label for="senha">Senha:</label>
            <input type="password" id="senhaCadastro" name="senhaCadastro" required><br><br>
         </div>

           <div class="input">
            <label for="perfil">Perfil:</label> 
            <select id="perfil" name="perfil" required>
            <option value="Leitor">Leitor</option>
            <option value="bibliotecario">Bibliotecario</option>
            </select>
            </div>
    </div>
  
          <button type="submit" class="btn"" onclick=" cadastrar()">Criar Conta</button>
               </form>   
  </div>  
        
</body>

</html>
